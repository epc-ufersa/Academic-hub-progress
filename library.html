<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academic Hub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style/library.css" />
    <link rel="stylesheet" href="style/style.css">

    <script src="script/darkMode.js" defer></script>
    <script src="script/init.js" defer></script>
    <script src="script/script.js" defer></script>
    <script src="script/menu.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <h1>Academic Hub</h1>
        <p>Biblioteca de Curadoria e Revisao</p>
      </div>
      <div class="header-actions" id="header-actions">
        <a
          class="btn-primary"
          href="index.html"
          aria-label="Voltar para página inicial"
        >
          Página Inicial
        </a>
        <button id="themeToggle" class="btn-primary" aria-label="Alternar Tema" onclick="toggleTheme()"
        >
          Modo Escuro
        </button>
      </div>

      <button id="btn-menu" class="btn-menu" aria-label="Mostrar ações" onclick="toggleMenu()">
        <i class="fa-solid fa-bars"></i>
      </button>
    </header>

    <main class="container">
      <section class="search-section" aria-label="Pesquisa">
        <div class="search-container">
          <input
            type="text"
            id="searchInput"
            placeholder="Buscar por assunto ou palavra-chave..."
            aria-label="Campo de pesquisa"
            oninput="searchCards(event.target.value)"
          />
        </div>
      </section>

      <section class="library-section" aria-label="Acervo de Cards">
        <div id="flashcards-grid" class="cards-grid">
          <!-- Cards são injetados pelo init.js -->
        </div>
      </section>
    </main>
  </body>
</html>
